services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ops_manager
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ops
      DB_PASSWORD: ops123
      DB_NAME: ops_manager
      JWT_SECRET: ops-manager-secret-key
      SERVER_PORT: "8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: